name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint ────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── Backend: tests ───────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests (pytest)
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: observatorio
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: observatorio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U observatorio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://observatorio:ci_password@localhost:5432/observatorio_test
      REDIS_URL: redis://localhost:6379
      APP_ENV: development
      APP_DEBUG: "false"
      CAMARA_API_BASE_URL: https://dadosabertos.camara.leg.br/api/v2
      TRANSPARENCIA_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        # Exit code 5 = no tests collected — treat as success until tests are written.
        run: uv run pytest -v --tb=short || [ $? -eq 5 ]

  # ── Frontend: type check ─────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend — Type check (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Frontend: lint ───────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Frontend: build ──────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build (next build)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck, frontend-lint]
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Security audit ───────────────────────────────────────────────────────────
  security:
    name: Security — Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Python — pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --requirement <(uv export --no-dev --no-hashes) --skip-editable

      - name: Node — npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
